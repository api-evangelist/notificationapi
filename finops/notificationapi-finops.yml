description: >-
  FinOps view of NotificationAPI spend. NotificationAPI bills a tiered monthly
  subscription anchored on monthly active users (MAU) and notification volume,
  plus per-message metering for paid channels such as SMS and voice. Cost is
  driven by how many distinct users are notified, how many notifications are
  sent, and the channel mix. Optimization levers include respecting user
  preferences and opt-outs, consolidating digests, and routing to lower-cost
  channels (in-app / email) before SMS or voice.
notes: >-
  Per-tier prices, MAU caps, and per-message rates change; verify against the
  NotificationAPI pricing page during reconciliation.
sources:
- https://www.notificationapi.com/pricing
- https://docs.notificationapi.com
